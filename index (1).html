<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Grupo Klarity</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
background:#ffffff;
overflow-x:hidden;
}

.page{
width:100%;
display:flex;
justify-content:center;
}

.page img{
display:block;
width:100%;
max-width:100%;
height:auto;
object-fit:contain;
-webkit-user-drag:none;
}

@media (min-width: 993px){
.page img{
width:100%;
}
}
</style>
</head>

<body>

<div class="page">
<img src="klarity-design.png" alt="Grupo Klarity">
</div>

</body>
</html>
